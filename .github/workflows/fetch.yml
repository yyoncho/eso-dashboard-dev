name: Fetch ESO data (disabled — runs locally via cron)

on:
  workflow_dispatch:   # manual only, kept as fallback

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 1

      - name: Checkout scripts from master
        run: |
          git fetch origin master
          git checkout origin/master -- fetch.py energy_charts.py

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch ESO snapshot
        run: python fetch.py

      - name: Commit data
        run: |
          git config user.name  "eso-bot"
          git config user.email "bot@eso-dashboard.github.io"
          git add data/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "data: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin data
