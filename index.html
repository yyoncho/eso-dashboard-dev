<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESO Dashboard — Bulgaria Grid</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
}

header {
  background: #161b22;
  border-bottom: 1px solid #21262d;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
}

header h1 {
  font-size: 1.1rem;
  font-weight: 700;
  color: #f0f6fc;
  letter-spacing: 0.02em;
}

header p { font-size: 0.75rem; color: #8b949e; margin-top: 2px; }

.live-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.75rem;
  color: #8b949e;
}

.pulse-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #3fb950;
  animation: pulse 2s infinite;
}

.pulse-dot.stale { background: #f85149; animation: none; }

@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(1.3); }
}

main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

/* ── stat cards ─────────────────────────────────────────────────────────── */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 20px;
}

.card {
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 10px;
  padding: 12px 14px;
}

.card-label {
  font-size: 0.68rem;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}

.card-value {
  font-size: 1.4rem;
  font-weight: 700;
  color: #f0f6fc;
  line-height: 1;
}

.card-unit {
  font-size: 0.72rem;
  color: #8b949e;
  margin-top: 2px;
}

.card.nuclear  { border-color: #58a6ff44; }
.card.coal     { border-color: #6e767d44; }
.card.hydro    { border-color: #1f6feb44; }
.card.wind     { border-color: #3fb95044; }
.card.solar    { border-color: #d29922aa; }
.card.battery  { border-color: #bc8cff44; }
.card.load     { border-color: #f8514944; }

/* ── charts ─────────────────────────────────────────────────────────────── */
.charts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}

.charts.wide { grid-template-columns: 1fr; }

.chart-box {
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 10px;
  overflow: hidden;
}

.chart-title {
  font-size: 0.75rem;
  font-weight: 600;
  color: #8b949e;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 12px 16px 0;
}

.plotly-chart { width: 100%; }

/* ── flows chart ─────────────────────────────────────────────────────────── */
.flow-bars {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 12px 16px 16px;
  height: 160px;
  position: relative;
}

.zero-line {
  position: absolute;
  left: 0; right: 0;
  border-top: 1px dashed #30363d;
}

/* ── day nav ─────────────────────────────────────────────────────────────── */
.day-nav {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.nav-btn {
  padding: 6px 14px;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #c9d1d9;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.15s;
}

.nav-btn:hover { background: #388bfd; border-color: #388bfd; color: #fff; }
.nav-btn.active { background: #388bfd; border-color: #388bfd; color: #fff; }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

#status-bar {
  font-size: 0.75rem;
  color: #8b949e;
  margin-left: auto;
}

@media (max-width: 720px) {
  .charts { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>ESO Dashboard &mdash; Bulgaria Grid</h1>
    <p>Real-time generation, load, and cross-border flows</p>
  </div>
  <div class="live-badge">
    <div class="pulse-dot" id="pulse"></div>
    <span id="last-updated">Loading…</span>
  </div>
</header>

<main>

  <!-- Day navigation -->
  <div class="day-nav">
    <button class="nav-btn" id="prev-day" onclick="shiftDay(-1)">&#8592;</button>
    <button class="nav-btn active" id="today-btn" onclick="goToday()">Today</button>
    <button class="nav-btn" id="next-day" onclick="shiftDay(1)" disabled>&#8594;</button>
    <span id="day-label" style="font-size:0.85rem;color:#c9d1d9;font-weight:600;"></span>
    <span id="status-bar"></span>
  </div>

  <!-- Current state cards -->
  <div class="cards" id="cards">
    <div class="card nuclear"><div class="card-label">Nuclear</div><div class="card-value" id="c-nuclear">—</div><div class="card-unit">MW</div></div>
    <div class="card coal">  <div class="card-label">Coal</div>   <div class="card-value" id="c-coal">—</div>   <div class="card-unit">MW</div></div>
    <div class="card hydro"> <div class="card-label">Hydro</div>  <div class="card-value" id="c-hydro">—</div>  <div class="card-unit">MW</div></div>
    <div class="card wind">  <div class="card-label">Wind</div>   <div class="card-value" id="c-wind">—</div>   <div class="card-unit">MW</div></div>
    <div class="card solar"> <div class="card-label">Solar</div>  <div class="card-value" id="c-solar">—</div>  <div class="card-unit">MW</div></div>
    <div class="card battery"><div class="card-label">Battery</div><div class="card-value" id="c-batt">—</div>  <div class="card-unit" id="c-batt-state">MW</div></div>
    <div class="card load">  <div class="card-label">Load</div>   <div class="card-value" id="c-load">—</div>   <div class="card-unit">MW</div></div>
    <div class="card">       <div class="card-label">Net import</div><div class="card-value" id="c-import">—</div><div class="card-unit">MW</div></div>
  </div>

  <!-- Charts row 1: generation mix + load vs gen -->
  <div class="charts">
    <div class="chart-box">
      <div class="chart-title">Generation mix (today)</div>
      <div id="chart-gen" class="plotly-chart" style="height:320px;"></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Load vs generation</div>
      <div id="chart-load" class="plotly-chart" style="height:320px;"></div>
    </div>
  </div>

  <!-- Charts row 2: cross-border flows -->
  <div class="charts wide">
    <div class="chart-box">
      <div class="chart-title">Cross-border flows (positive = import into BG)</div>
      <div id="chart-flows" class="plotly-chart" style="height:280px;"></div>
    </div>
  </div>

</main>

<script>
// ── config ──────────────────────────────────────────────────────────────────
const REFRESH_MS   = 5 * 60 * 1000;  // 5 minutes
const STALE_MS     = 8 * 60 * 1000;  // mark stale after 8 min without update
const BASE         = './data';

const FLOW_NAMES   = { RO_mw: 'Romania', SR_mw: 'Serbia', MK_mw: 'N.Macedonia', GR_mw: 'Greece', TR_mw: 'Turkey' };
const FLOW_COLORS  = { RO_mw: '#58a6ff', SR_mw: '#79c0ff', MK_mw: '#56d364', GR_mw: '#f78166', TR_mw: '#d2a8ff' };

const GEN_SERIES = [
  { key: 'АЕЦ',                   label: 'Nuclear',       color: '#58a6ff' },
  { key: 'Кондензационни ТЕЦ',    label: 'Coal',          color: '#6e767d' },
  { key: 'Топлофикационни ТЕЦ',   label: 'CHP thermal',   color: '#9e6a03' },
  { key: 'Заводски ТЕЦ',          label: 'Industrial CHP',color: '#bf8700' },
  { key: 'ВЕЦ',                   label: 'Hydro',         color: '#1f6feb' },
  { key: 'Малки ВЕЦ',             label: 'Small hydro',   color: '#388bfd' },
  { key: 'ВяЕЦ',                  label: 'Wind',          color: '#3fb950' },
  { key: 'ФЕЦ',                   label: 'Solar',         color: '#d29922' },
  { key: 'Био ЕЦ',                label: 'Biomass',       color: '#56d364' },
];

// ── state ────────────────────────────────────────────────────────────────────
let allDates   = [];
let currentDay = null;   // YYYY-MM-DD string, null = today
let chartsInit = false;
let lastFetchedDate = null;

// ── fetch helpers ────────────────────────────────────────────────────────────
async function getJSON(url) {
  const r = await fetch(url + '?_=' + Date.now());
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function getJSONL(url) {
  const r = await fetch(url + '?_=' + Date.now());
  if (!r.ok) throw new Error(r.status);
  const text = await r.text();
  return text.trim().split('\n').filter(Boolean).map(l => JSON.parse(l));
}

// ── init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const idx = await getJSON(`${BASE}/index.json`);
    allDates = idx.dates || [];
    await refreshAll();
  } catch (e) {
    document.getElementById('status-bar').textContent = 'Error loading index: ' + e.message;
  }
  setInterval(refreshAll, REFRESH_MS);
}

async function refreshAll() {
  try {
    // always reload index to get new dates
    const idx = await getJSON(`${BASE}/index.json`);
    allDates = idx.dates || [];
    updateNavButtons();

    const dayToLoad = currentDay || todayStr();
    const records   = await loadDayRecords(dayToLoad);
    const latest    = records.length ? records[records.length - 1] : null;

    if (latest) updateCards(latest);
    renderCharts(records);
    updateTimestamp(latest);
    document.getElementById('day-label').textContent = dayToLoad;
    document.getElementById('status-bar').textContent = `${records.length} snapshots`;
  } catch (e) {
    console.error(e);
    document.getElementById('status-bar').textContent = 'Fetch error: ' + e.message;
  }
}

async function loadDayRecords(date) {
  // try the specific day file; today also exists as today.jsonl
  const isToday = date === todayStr();
  const url = isToday ? `${BASE}/today.jsonl` : `${BASE}/${date}.jsonl`;
  return await getJSONL(url);
}

// ── nav ───────────────────────────────────────────────────────────────────────
function todayStr() {
  // Use UTC+3 approx for Bulgaria
  const now = new Date(Date.now() + 3 * 3600 * 1000);
  return now.toISOString().slice(0, 10);
}

function shiftDay(delta) {
  const today = todayStr();
  const base  = currentDay || today;
  const dates = [...allDates];
  let idx = dates.indexOf(base);
  if (idx === -1) return;
  idx = Math.max(0, Math.min(dates.length - 1, idx + delta));
  const newDay = dates[idx];
  currentDay = newDay === today ? null : newDay;
  refreshAll();
}

function goToday() {
  currentDay = null;
  refreshAll();
}

function updateNavButtons() {
  const today = todayStr();
  const base  = currentDay || today;
  const dates = allDates;
  const idx   = dates.indexOf(base);

  document.getElementById('prev-day').disabled = (idx <= 0);
  document.getElementById('next-day').disabled = (idx >= dates.length - 1 || currentDay === null);
  document.getElementById('today-btn').classList.toggle('active', currentDay === null);
}

// ── cards ─────────────────────────────────────────────────────────────────────
function fmt(v, digits = 0) {
  if (v === undefined || v === null || isNaN(v)) return '—';
  return Number(v).toFixed(digits);
}

function updateCards(r) {
  document.getElementById('c-nuclear').textContent = fmt(r['АЕЦ']);
  const coal = (r['Кондензационни ТЕЦ'] || 0) + (r['Топлофикационни ТЕЦ'] || 0) + (r['Заводски ТЕЦ'] || 0);
  document.getElementById('c-coal').textContent    = fmt(coal);
  const hydro = (r['ВЕЦ'] || 0) + (r['Малки ВЕЦ'] || 0);
  document.getElementById('c-hydro').textContent   = fmt(hydro);
  document.getElementById('c-wind').textContent    = fmt(r['ВяЕЦ']);
  document.getElementById('c-solar').textContent   = fmt(r['ФЕЦ']);
  const battMw = r['ССЕЕ_mw'];
  document.getElementById('c-batt').textContent      = fmt(Math.abs(battMw));
  document.getElementById('c-batt-state').textContent = battMw === undefined ? 'MW' :
    (r['ССЕЕ_state'] === 'charging' ? 'MW charging' : 'MW discharging');
  document.getElementById('c-load').textContent    = fmt(r['load_mw'] || r['Товар на РБ']);
  document.getElementById('c-import').textContent  = fmt(r['net_import_mw']);
}

// ── timestamp ─────────────────────────────────────────────────────────────────
function updateTimestamp(r) {
  const el    = document.getElementById('last-updated');
  const dot   = document.getElementById('pulse');
  if (!r) { el.textContent = 'No data'; return; }

  const tsRaw = r.timestamp_utc || r.timestamp;
  if (!tsRaw) return;

  const ts = tsRaw.includes('T') ? new Date(tsRaw) : new Date(tsRaw.replace(' ', 'T') + 'Z');
  const ageMs = Date.now() - ts.getTime();
  const mins  = Math.round(ageMs / 60000);

  el.textContent = `Updated ${mins < 2 ? 'just now' : mins + ' min ago'}`;
  dot.className  = 'pulse-dot' + (ageMs > STALE_MS ? ' stale' : '');
}

// ── charts ────────────────────────────────────────────────────────────────────
const DARK = {
  paper_bgcolor: '#161b22',
  plot_bgcolor:  '#161b22',
  font:          { color: '#8b949e', size: 11 },
  xaxis:         { gridcolor: '#21262d', linecolor: '#30363d', tickfont: { size: 10 } },
  yaxis:         { gridcolor: '#21262d', linecolor: '#30363d', tickfont: { size: 10 } },
  legend:        { bgcolor: 'transparent', font: { size: 10 } },
  margin:        { t: 10, b: 50, l: 55, r: 10 },
};

function renderCharts(records) {
  if (!records.length) return;

  const ts  = records.map(r => r.timestamp_utc ? new Date(r.timestamp_utc) :
                                new Date(r.timestamp.replace(' ', 'T') + 'Z'));

  // ── generation stacked area ───────────────────────────────────────────────
  const genTraces = GEN_SERIES.map(s => ({
    x: ts,
    y: records.map(r => r[s.key] || 0),
    name: s.label,
    stackgroup: 'gen',
    fillcolor: s.color,
    line: { width: 0, color: s.color },
    hovertemplate: `${s.label}: %{y:.0f} MW<extra></extra>`,
  }));

  Plotly.react('chart-gen', genTraces, {
    ...DARK,
    yaxis: { ...DARK.yaxis, title: 'MW' },
    showlegend: true,
    legend: { ...DARK.legend, orientation: 'h', y: -0.25 },
  }, { responsive: true, displayModeBar: false });

  // ── load vs total gen ────────────────────────────────────────────────────
  const loadTrace = {
    x: ts,
    y: records.map(r => r['load_mw'] || r['Товар на РБ'] || 0),
    name: 'Load',
    line: { color: '#f85149', width: 2 },
    hovertemplate: 'Load: %{y:.0f} MW<extra></extra>',
  };
  const genTotalTrace = {
    x: ts,
    y: records.map(r => r['gen_total_mw'] || 0),
    name: 'Generation',
    line: { color: '#3fb950', width: 2 },
    fill: 'tonexty',
    fillcolor: 'rgba(63,185,80,0.1)',
    hovertemplate: 'Gen: %{y:.0f} MW<extra></extra>',
  };
  const battTrace = {
    x: ts,
    y: records.map(r => r['ССЕЕ_mw'] || 0),
    name: 'Battery (+ discharge)',
    line: { color: '#bc8cff', width: 1.5, dash: 'dot' },
    hovertemplate: 'Battery: %{y:.0f} MW<extra></extra>',
  };

  Plotly.react('chart-load', [loadTrace, genTotalTrace, battTrace], {
    ...DARK,
    yaxis: { ...DARK.yaxis, title: 'MW' },
    showlegend: true,
    legend: { ...DARK.legend, orientation: 'h', y: -0.25 },
  }, { responsive: true, displayModeBar: false });

  // ── cross-border flows ───────────────────────────────────────────────────
  const flowTraces = Object.entries(FLOW_NAMES).map(([key, label]) => ({
    x: ts,
    y: records.map(r => r[key] || 0),
    name: label,
    stackgroup: null,
    line: { color: FLOW_COLORS[key], width: 1.5 },
    hovertemplate: `${label}: %{y:.0f} MW<extra></extra>`,
  }));

  const netImportTrace = {
    x: ts,
    y: records.map(r => r['net_import_mw'] || 0),
    name: 'Net import',
    line: { color: '#ffffff', width: 2, dash: 'dot' },
    hovertemplate: 'Net import: %{y:.0f} MW<extra></extra>',
  };

  Plotly.react('chart-flows', [...flowTraces, netImportTrace], {
    ...DARK,
    yaxis: { ...DARK.yaxis, title: 'MW (+import / −export)' },
    showlegend: true,
    legend: { ...DARK.legend, orientation: 'h', y: -0.3 },
    shapes: [{
      type: 'line', xref: 'paper', x0: 0, x1: 1,
      y0: 0, y1: 0,
      line: { color: '#30363d', width: 1, dash: 'dash' },
    }],
  }, { responsive: true, displayModeBar: false });
}

// ── boot ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
